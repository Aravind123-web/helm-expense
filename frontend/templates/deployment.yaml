apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: expense
  # These labels are deployemnt related labesl
  labels:
    component: frontend
    project: expense
    tier: web
spec:
  replicas: {{ .Values.deployment.replicas }}
  selector:
    matchLabels:
      component: frontend
      project: expense
      tier: web
  # pod defination
  template:
    metadata:
      # These labels are pod related lables
      labels:
         component: frontend
         project: expense
         tier: web
    spec:
      containers:
      - name: frontend
        image: aravind19981999/expense-frontend:{{ .Values.deployment.imageVersion }}
        volumeMounts:
        - name: nginx-conf
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
          readOnly: true
          # envFrom:
          # - configMapRef:
          #      name: frontend
      volumes:
      - name: nginx-conf
        configMap:
          name: frontend
          items:
          - key: nginx.conf
            path: nginx.conf